<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard ITE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;padding:1.5rem 1rem}
.wrap{max-width:720px;margin:0 auto}
.card{background:#fff;border-radius:16px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:1rem}
h1{font-size:22px;font-weight:600;color:#111;margin-bottom:.3rem}
p{color:#555;font-size:13px;line-height:1.6}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem}
.stat{background:#f8fafc;border-radius:12px;padding:1rem;text-align:center}
.stat-n{font-size:28px;font-weight:700;color:#111}
.stat-l{font-size:11px;color:#888;margin-top:4px}
.chart-wrap{position:relative;width:100%;height:280px;margin-bottom:1rem}
.btn{padding:10px 18px;border-radius:10px;border:1.5px solid #e5e7eb;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#374151}
.btn:hover{background:#f9fafb}
.btn-blue{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.btn-blue:hover{background:#1e40af}
.legend{display:flex;gap:16px;margin-bottom:8px;font-size:12px;color:#666;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:5px}
.lsq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.ai-out{font-size:13px;line-height:1.75;color:#374151}
.ai-out p{margin-bottom:.75rem}
.loading{text-align:center;padding:2rem;color:#9ca3af;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div>
        <h1>Dashboard ITE</h1>
        <p>Psicologia dei Processi Cognitivi — Annette Perkovic · Martina Fossa</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="loadData()">Aggiorna</button>
        <button class="btn btn-blue" id="ai-btn" onclick="analyzeAI()">Analisi AI ↗</button>
      </div>
    </div>
  </div>

  <div class="stat-grid">
    <div class="stat"><div class="stat-n" id="st-s1">—</div><div class="stat-l">risposte S1</div></div>
    <div class="stat"><div class="stat-n" id="st-s2">—</div><div class="stat-l">risposte S2</div></div>
    <div class="stat"><div class="stat-n" id="st-old">—</div><div class="stat-l">media frasi vecchie</div></div>
    <div class="stat"><div class="stat-n" id="st-new">—</div><div class="stat-l">media frasi nuove</div></div>
    <div class="stat"><div class="stat-n" id="st-delta" style="color:#1d4ed8">—</div><div class="stat-l">Δ ITE (vecchie − nuove)</div></div>
  </div>

  <div class="card">
    <div class="legend" id="leg1"></div>
    <div class="chart-wrap"><canvas id="c1" role="img" aria-label="Confronto credibilità frasi vecchie vs nuove">Caricamento...</canvas></div>
  </div>

  <div class="card">
    <div id="ai-out" class="loading">Premi "Analisi AI" per generare l'interpretazione automatica.</div>
  </div>

  <div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <p style="color:#9ca3af;font-size:12px">Dashboard riservata ai docenti</p>
    <button class="btn" style="color:#dc2626;border-color:#fca5a5" onclick="clearData()">Azzera dati</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://ydfioyuwqaqhiscwgpok.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkZmlveXV3cWFxaGlzY3dncG9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzU4NTcsImV4cCI6MjA5MjMxMTg1N30.CRj5KxytTuWP7PPupR-xywZTdssKDkRCwldg89GOnHE';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allRows = [], chart1;

async function loadData() {
  const { data, error } = await supabase.from('risposte').select('*');
  if (error) { console.error(error); return; }
  allRows = data || [];

  const s1 = allRows.filter(r => r.sessione === 1);
  const s2 = allRows.filter(r => r.sessione === 2);
  const old = s2.filter(r => r.tipo === 'vecchia').map(r => r.rating);
  const nov = s2.filter(r => r.tipo === 'nuova').map(r => r.rating);
  const avg = arr => arr.length ? +(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2) : 0;

  document.getElementById('st-s1').textContent = s1.length;
  document.getElementById('st-s2').textContent = s2.length;
  document.getElementById('st-old').textContent = avg(old).toFixed(2);
  document.getElementById('st-new').textContent = avg(nov).toFixed(2);
  const delta = (avg(old) - avg(nov)).toFixed(2);
  const el = document.getElementById('st-delta');
  el.textContent = (delta > 0 ? '+' : '') + delta;
  el.style.color = delta > 0 ? '#15803d' : '#dc2626';

  drawChart(avg(old), avg(nov));
}

function drawChart(old, nov) {
  if (chart1) chart1.destroy();
  chart1 = new Chart(document.getElementById('c1'), {
    type: 'bar',
    data: {
      labels: ['Frasi già viste (S1+S2)', 'Frasi nuove (solo S2)'],
      datasets: [{
        data: [old, nov],
        backgroundColor: ['#3b82f6', '#d1d5db'],
        borderColor: ['#1d4ed8', '#9ca3af'],
        borderWidth: 1,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { min: 1, max: 7, ticks: { stepSize: 1 }, title: { display: true, text: 'Credibilità media (1–7)' } } },
      plugins: { legend: { display: false }, title: { display: true, text: 'Effetto ITE: frasi vecchie vs frasi nuove' } }
    }
  });
  document.getElementById('leg1').innerHTML = `
    <span><span class="lsq" style="background:#3b82f6"></span>Frasi già viste</span>
    <span><span class="lsq" style="background:#d1d5db"></span>Frasi nuove</span>`;
}

async function analyzeAI() {
  const btn = document.getElementById('ai-btn');
  const out = document.getElementById('ai-out');
  btn.disabled = true; btn.textContent = 'Analisi...';
  out.innerHTML = '<p>Generando interpretazione accademica...</p>';

  const s2 = allRows.filter(r => r.sessione === 2);
  const old = s2.filter(r => r.tipo === 'vecchia').map(r => r.rating);
  const nov = s2.filter(r => r.tipo === 'nuova').map(r => r.rating);
  const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2) : 'N/D';

  const prompt = `Esperimento sull'Illusory Truth Effect, replica universitaria.
Design: 2 sessioni. Sessione 1: scala "quanto è interessante?" (1-7), 16 frasi nuove — serve solo come esposizione iniziale, non rivela lo scopo. Sessione 2 (2-3 giorni dopo): scala "quanto è vera?" (1-7), 8 frasi già viste in S1 + 8 frasi nuove mescolate.

DATI:
- Risposte S1: ${allRows.filter(r=>r.sessione===1).length}
- Risposte S2: ${s2.length}
- Media credibilità frasi VECCHIE (già viste): ${avg(old)} / 7
- Media credibilità frasi NUOVE (mai viste): ${avg(nov)} / 7
- Delta ITE: ${old.length&&nov.length?(parseFloat(avg(old))-parseFloat(avg(nov))).toFixed(2):'N/D'}

Scrivi un'interpretazione accademica in italiano (max 200 parole) in paragrafi: 1) Risultato principale 2) Confronto con Hasher et al. 1977 3) Limiti 4) Conclusione. Senza elenchi puntati.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 800,
        system: 'Sei un esperto di psicologia cognitiva. Rispondi sempre in italiano, in prosa, senza elenchi.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    const text = data.content?.filter(c=>c.type==='text').map(c=>c.text).join('\n') || 'N/D';
    out.innerHTML = text.split('\n').filter(l=>l.trim()).map(l=>`<p>${l}</p>`).join('');
  } catch(e) {
    out.innerHTML = `<p style="color:#dc2626">Errore: ${e.message}</p>`;
  }
  btn.disabled = false; btn.textContent = 'Analisi AI ↗';
}

async function clearData() {
  if (!confirm('Cancellare tutti i dati?')) return;
  await supabase.from('risposte').delete().neq('id', 0);
  loadData();
}

loadData();
</script>
</body>
</html>
